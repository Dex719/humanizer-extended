name: Version sync

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check release metadata
        run: python scripts/check_version_sync.py
